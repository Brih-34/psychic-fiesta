<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychic Fiesta - Bri & Bartolo</title>
    <style>
        :root {
            --rosa-bri-body: #ffc0cb; /* El rosa cute de Bri */
            --rosa-bri-vivid: #ff69b4; /* Rosa coqueta fuerte */
            --rosa-claro: #fff0f5;
            --negro-trans: rgba(10, 10, 10, 0.94);
        }

        @keyframes fadeInMundo { from { opacity: 0; } to { opacity: 1; } }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: flex-end;
            background: #111 no-repeat center center/cover;
            font-family: 'Avenir Next', 'Helvetica Neue', sans-serif; overflow: hidden;
            transition: background-image 1.5s ease-in-out;
            animation: fadeInMundo 2s;
        }

        /* --- HUD (Interfaz Superior) --- */
        #hud { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 100; }
        .stat-box { background: var(--negro-trans); padding: 12px 25px; border-radius: 50px; border: 2px solid var(--rosa-bri-vivid); color: white; font-weight: bold; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(255, 105, 180, 0.4); }
        #musica-control { cursor: pointer; transition: 0.3s; }
        #musica-control:hover { transform: scale(1.1); }

        /* --- CAJA DE DIÁLOGO --- */
        #game-ui { position: relative; z-index: 2; width: 94%; max-width: 950px; background: var(--negro-trans); border: 4px solid var(--rosa-bri-vivid); border-radius: 30px; padding: 40px; margin-bottom: 25px; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9); animation: slideUp 1s ease-out; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- BARTOLO COMO BRI ANIMADA (CSS ART) --- */
        #bri-avatar {
            position: absolute; top: -140px; right: 60px; width: 150px; height: 150px;
            animation: flotarGenerico 3s ease-in-out infinite; z-index: 10;
        }

        /* El cuerpo de Bri (tomando la forma de Bartolo) */
        #bri-body {
            width: 100px; height: 130px; background: var(--rosa-bri-body);
            border-radius: 60px 60px 30px 30px; position: relative; margin: 0 auto;
            border: 5px solid white; box-shadow: 0 10px 30px rgba(255, 105, 180, 0.8);
            transition: 0.5s;
        }

        /* La cabeza blanca de Bartolo en Bri */
        #bri-head {
            width: 90px; height: 90px; background: white; border-radius: 50%;
            position: absolute; top: -20px; left: 5px; z-index: 1;
        }

        /* Ojos coquetos animados */
        .ojo { width: 12px; height: 18px; background: #222; border-radius: 50%; position: absolute; top: 35px; animation: parpadeo 4s infinite; }
        #ojo-izq { left: 25px; }
        #ojo-der { right: 25px; }

        @keyframes parpadeo { 0%, 95%, 100% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }

        /* El piquito amarillo de Bartolo */
        #bri-beak {
            width: 20px; height: 25px; background: #ffd700;
            position: absolute; top: 50px; left: 35px;
            border-radius: 0 0 10px 10px; z-index: 2;
        }

        /* La marca azul de Bartolo, ahora rosa vivid */
        .marca-mejilla {
            width: 15px; height: 10px; background: var(--rosa-bri-vivid);
            position: absolute; top: 55px; border-radius: 50%; opacity: 0.7;
        }
        #marca-izq { left: 10px; }
        #marca-der { right: 10px; }

        /* Animaciones de Bri */
        @keyframes flotarGenerico { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-25px) rotate(2deg); } }
        @keyframes briCoqueta { 0%, 100% { transform: translateY(0) rotate(0deg); } 20% { transform: rotate(10deg); } 40% { transform: rotate(-10deg); } 60% { transform: scale(1.1); } }
        @keyframes briDivertida { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- TEXTO Y BOTONES --- */
        #nombre-box { color: var(--rosa-bri-vivid); font-size: 1.8rem; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        #texto-historia { color: #fff; font-size: 1.3rem; min-height: 120px; line-height: 1.8; transition: 0.3s; }
        .botones-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        button {
            background: linear-gradient(135deg, var(--rosa-bri-vivid), #d02090);
            color: white; border: none; padding: 20px; border-radius: 20px;
            cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); text-transform: uppercase;
        }
        button:hover { background: white; color: var(--rosa-bri-vivid); transform: scale(1.05) translateY(-5px); box-shadow: 0 10px 25px rgba(255, 105, 180, 0.6); }

        /* Corazón latiente */
        #corazon { animation: heartbeatHud 2s infinite; display: inline-block; }
        @keyframes heartbeatHud { 0%, 100% { transform: scale(1); } 10%, 30% { transform: scale(1.3); } 20% { transform: scale(1.1); } }
        .gain-pts { animation: gainPoints 0.5s ease; }
        @keyframes gainPoints { 0% { transform: scale(1); filter: brightness(2); } 100% { transform: scale(1); filter: brightness(1); } }

    </style>
</head>
<body>

    <audio id="bgm" loop src="https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Lofi-Chill-Melody.mp3"></audio>

    <div id="hud">
        <div class="stat-box" id="afinidad-stat">
            <span id="corazon">❤️</span> <span id="txt-afinidad">Afinidad: 0</span>
        </div>
        <div class="stat-box" id="musica-control" onclick="toggleMusica()">
            🎵 <span id="musica-estado">OFF</span>
        </div>
        <div class="stat-box">
            ✨ <span id="txt-objeto">Objeto: Ninguno</span>
        </div>
    </div>

    <div id="game-ui">
        <div id="bri-avatar">
            <div id="bri-body">
                <div id="bri-head">
                    <div class="ojo" id="ojo-izq"></div>
                    <div class="ojo" id="ojo-der"></div>
                    <div id="bri-beak"></div>
                    <div class="marca-mejilla" id="marca-izq"></div>
                    <div class="marca-mejilla" id="marca-der"></div>
                </div>
            </div>
        </div>
        <div id="nombre-box">Bri</div>
        <div id="texto-historia">Cargando Shifting coquetón...</div>
        <div id="btn-container" class="botones-grid"></div>
    </div>

    <script>
        const bgm = document.getElementById('bgm');
        const textoDiv = document.getElementById('texto-historia');
        const btnDiv = document.getElementById('btn-container');
        const nombreDiv = document.getElementById('nombre-box');
        const briBody = document.getElementById('bri-body');
        
        let stats = { afinidad: 0, objeto: "Ninguno", musica: false };

        function toggleMusica() {
            stats.musica = !stats.musica;
            document.getElementById('musica-estado').innerText = stats.musica ? "ON" : "OFF";
            stats.musica ? bgm.play() : bgm.pause();
        }

        function animarBri(tipo) {
            briBody.style.animation = 'none'; // Reset
            void briBody.offsetWidth; // Trigger reflow
            if (tipo === 'coqueta') briBody.style.animation = 'briCoqueta 1s ease';
            if (tipo === 'divertida') briBody.style.animation = 'briDivertida 0.8s ease';
            if (tipo === 'cute') briBody.style.border = '10px solid var(--rosa-bri-vivid)';
            else briBody.style.border = '5px solid white';
        }

        function updateStats(pts, obj) {
            if (pts) {
                stats.afinidad += pts;
                document.getElementById('txt-afinidad').innerText = `Afinidad: ${stats.afinidad}`;
                document.getElementById('afinidad-stat').classList.add('gain-pts');
                setTimeout(() => document.getElementById('afinidad-stat').classList.remove('gain-pts'), 500);
            }
            if (obj) {
                stats.objeto = obj;
                document.getElementById('txt-objeto').innerText = `Objeto: ${obj}`;
            }
        }

        const escenas = {
            inicio: {
                nombre: "Bri",
                anim: "cute",
                texto: "¡Hola, Shifter! Soy Bri, tu periquito guía (¿a que soy cute? 😉). Para cruzar, necesito que elijas un objeto de poder. ¡Elige con el corazón!",
                opciones: [
                    { texto: "📖 Libro Mágico", sig: 'universos', obj: 'Libro', anim: 'coqueta' },
                    { texto: "📿 Collar de Plata", sig: 'universos', obj: 'Collar', anim: 'cute' },
                    { texto: "💍 Anillo de Hierro", sig: 'universos', obj: 'Anillo', anim: 'divertida' }
                ]
            },
            universos: {
                nombre: "Bri",
                anim: "divertida",
                texto: "¡Uff, qué energía! Ya estamos listos. Cierra los ojos fuerte... ¿A qué universo quieres que te lleve este Shifting coquetón?",
                opciones: [
                    { texto: "⚔️ AoT (Muros)", sig: 'aot', bg: 'https://images.unsplash.com/photo-1580136608079-720212d8001e?q=80&w=1600' },
                    { texto: "⚡ Harry Potter", sig: 'hp', bg: 'https://images.unsplash.com/photo-1598115629161-5d0705f42654?q=80&w=1600' },
                    { texto: "🍎 Crepúsculo", sig: 'twilight', bg: 'https://images.unsplash.com/photo-1542281286-9e0a16bb7366?q=80&w=1600' }
                ]
            },
            aot: {
                nombre: "Levi Ackerman",
                texto: "Ves al Capitán Levi limpiando obsesivamente una ventana. Te mira con desprecio. 'Tú... ¿Sabes lo que es la disciplina o solo eres otra molestia?'",
                opciones: [
                    { texto: "Hacer el saludo militar", sig: 'final_aot', pts: 20 },
                    { texto: "Quejarte del polvo", sig: 'game_over', pts: -10 }
                ]
            },
            hp: {
                nombre: "Draco Malfoy",
                texto: "En los pasillos de Slytherin, Draco te detiene. 'Vaya, parece que tenemos Sangre Nueva... ¿Acaso me lo vas a mostrar o tendré que pedírselo a mi padre?'",
                opciones: [
                    { texto: "Presumir tu objeto", sig: 'final_hp', pts: 15 },
                    { texto: "Desafiarlo", sig: 'game_over', pts: -5 }
                ]
            },
            twilight: {
                nombre: "Edward Cullen",
                texto: "Edward te mira fijamente bajo la lluvia. 'Tu mente está en silencio... es frustrante. ¿Qué eres?'",
                opciones: [
                    { texto: "Decir 'Shifter'", sig: 'final_tw', pts: 25 },
                    { texto: "Misterio...", sig: 'game_over', pts: 5 }
                ]
            },
            // FINALES
            final_aot: { nombre: "FIN", texto: "Levi te respeta. Te ha hecho su asistente de limpieza. (Final de Orden)", opciones: [{ texto: "Jugar de nuevo", sig: 'inicio' }] },
            final_hp: { nombre: "FIN", texto: "¡Draco te invita a la sala común! Eres popular. (Final Romántico)", opciones: [{ texto: "Jugar de nuevo", sig: 'inicio' }] },
            final_tw: { nombre: "FIN", texto: "Edward te presenta a los Cullen. Alice ha visto vuestro futuro. (Final de Amor)", opciones: [{ texto: "Jugar de nuevo", sig: 'inicio' }] },
            game_over: { nombre: "GAME OVER", texto: "¡Ups! Bri te salvó en el último segundo. '¡Cuidado con lo que dices!'", opciones: [{ texto: "Reintentar", sig: 'inicio' }] }
        };

        function render(id) {
            const e = escenas[id];
            if (e.bg) document.body.style.backgroundImage = `url(${e.bg})`;
            nombreDiv.innerText = e.nombre;
            textoDiv.innerHTML = e.texto;
            btnDiv.innerHTML = '';
            animarBri(e.anim);

            e.opciones.forEach(o => {
                const b = document.createElement('button');
                b.innerText = o.texto;
                b.onclick = () => {
                    if (o.anim) animarBri(o.anim);
                    updateStats(o.pts, o.obj);
                    render(o.sig);
                };
                btnDiv.appendChild(b);
            });
        }

        render('inicio');
    </script>
</body>
</html>
